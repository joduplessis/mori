<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Momento Mori" />
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
    <title>Momento Mori</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100vh;
        overflow: hidden;
        background: #0d1117;
        color: #c9d1d9;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        padding: 20px 24px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
        margin-bottom: 12px;
        flex-wrap: wrap;
        gap: 8px;
      }

      .toggle {
        display: flex;
        background: #161b22;
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid #30363d;
        flex-shrink: 0;
      }

      .toggle button {
        background: none;
        border: none;
        color: #8b949e;
        font-size: 11px;
        padding: 5px 12px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }

      .toggle button.active {
        background: #238636;
        color: #fff;
      }

      .toggle button:hover:not(.active) {
        color: #c9d1d9;
        background: #1c2128;
      }

      .stats {
        display: flex;
        gap: 24px;
        font-size: 12px;
        color: #484f58;
      }

      .stat {
        display: flex;
        align-items: baseline;
        gap: 5px;
      }

      .stat-value {
        font-variant-numeric: tabular-nums;
        color: #6e7681;
        font-weight: 500;
      }

      .stat-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .progress-bar {
        flex-shrink: 0;
        height: 3px;
        background: #161b22;
        border-radius: 2px;
        margin-bottom: 12px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #006d32, #26a641, #39d353);
        border-radius: 2px;
        transition: width 1s ease;
      }

      .grid-container {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #grid {
        display: grid;
        gap: 1px;
        width: 100%;
        height: 100%;
      }

      .day {
        border-radius: 1px;
      }

      .day.today {
        background: #f0883e;
        border-radius: 1px;
        box-shadow: 0 0 4px #f0883e88;
      }

      .day.remaining {
        background: #161b22;
      }

      .age-markers {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: #484f58;
        margin-top: 6px;
        padding: 0 2px;
      }

      @media (max-width: 600px) {
        .header {
          justify-content: center;
        }
        .stats {
          width: 100%;
          justify-content: center;
        }
        #grid {
          display: grid;
          gap: 1px;
          width: 100%;
          height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="toggle" id="toggle">
        <button data-mode="whole" id="btnWhole" class="active">—</button>
        <button data-mode="from40" id="btnFrom40">—</button>
        <button data-mode="decade" id="btnDecade">—</button>
        <button data-mode="birthday" id="btnBirthday">—</button>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-value" id="today">—</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="viewLabel">—</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="elapsed">—</span>
          <span class="stat-label">elapsed</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="remaining">—</span>
          <span class="stat-label">left</span>
        </div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="grid-container" id="gridContainer">
      <div id="grid"></div>
    </div>

    <div class="age-markers" id="ageMarkers"></div>

    <script>
      // ── CONFIG ──
      const params = new URLSearchParams(window.location.search);
      const birthParam = params.get("birth");
      const BIRTH = birthParam ? new Date(birthParam) : new Date(1971, 5, 28);
      const AGE_END = parseInt(params.get("end")) || 80;
      const AGE_FROM = parseInt(params.get("from")) || 50;

      function updateURL() {
        const p = new URLSearchParams();
        const b = BIRTH.getFullYear() + "-" + String(BIRTH.getMonth() + 1).padStart(2, "0") + "-" + String(BIRTH.getDate()).padStart(2, "0");
        p.set("birth", b);
        p.set("end", AGE_END);
        p.set("from", AGE_FROM);
        p.set("mode", currentMode);
        history.replaceState(null, "", "?" + p.toString());
      }
      // ────────────

      // Decade colors — alternating green hues for elapsed days
      const DECADE_COLORS = {
        0:  "#064e1a",
        10: "#0a6b26",
        20: "#0e8530",
        30: "#16a43a",
        40: "#26c244",
        50: "#39d353",
        60: "#57db6b",
        70: "#7ee88a",
        80: "#a0f0a8",
        90: "#c8f7cc",
      };

      // Remaining day colors per decade — subtle dark variations
      const DECADE_REMAINING = {
        0:  "#0a120c",
        10: "#0f1a14",
        20: "#14221c",
        30: "#1a2c24",
        40: "#20362e",
        50: "#264038",
        60: "#2e4c42",
        70: "#36584e",
        80: "#3e645a",
        90: "#467066",
      };

      const VALID_MODES = ["whole", "from40", "decade", "birthday"];
      const savedMode = params.get("mode");
      let currentMode = VALID_MODES.includes(savedMode) ? savedMode : "whole";

      function addYears(date, years) {
        const d = new Date(date);
        d.setFullYear(d.getFullYear() + years);
        return d;
      }

      function daysBetween(a, b) {
        return Math.floor((b - a) / 86400000);
      }

      function getCurrentAge() {
        const now = new Date();
        return Math.floor((now - BIRTH) / (365.25 * 86400000));
      }

      function getRange() {
        if (currentMode === "decade") {
          const currentDecade = Math.floor(getCurrentAge() / 10) * 10;
          const start = addYears(BIRTH, currentDecade);
          const end = addYears(BIRTH, currentDecade + 10);
          return { start, end, total: daysBetween(start, end) };
        }
        if (currentMode === "birthday") {
          const now = new Date();
          const age = getCurrentAge();
          const lastBirthday = addYears(BIRTH, age);
          const nextBirthday = addYears(BIRTH, age + 1);
          // If last birthday is in the future (hasn't happened yet this year), step back
          if (lastBirthday > now) {
            return { start: addYears(BIRTH, age - 1), end: lastBirthday, total: daysBetween(addYears(BIRTH, age - 1), lastBirthday) };
          }
          return { start: lastBirthday, end: nextBirthday, total: daysBetween(lastBirthday, nextBirthday) };
        }
        const start = currentMode === "whole" ? BIRTH : addYears(BIRTH, AGE_FROM);
        const end = addYears(BIRTH, AGE_END);
        return { start, end, total: daysBetween(start, end) };
      }

      // For a given day index, find which decade it belongs to
      function getDecadeForDay(dayIndex, rangeStart) {
        const dayDate = new Date(rangeStart.getTime() + dayIndex * 86400000);
        const ageMs = dayDate - BIRTH;
        const ageYears = ageMs / (365.25 * 86400000);
        const decade = Math.floor(ageYears / 10) * 10;
        return Math.min(decade, 90);
      }

      let days = [];

      // Set active button from saved mode
      document.querySelectorAll("#toggle button").forEach((b) => {
        b.classList.toggle("active", b.dataset.mode === currentMode);
      });

      document.getElementById("toggle").addEventListener("click", function (e) {
        const btn = e.target.closest("button[data-mode]");
        if (!btn || btn.classList.contains("active")) return;
        document
          .querySelectorAll("#toggle button")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        currentMode = btn.dataset.mode;
        updateURL();
        buildGrid();
      });

      function buildGrid() {
        const grid = document.getElementById("grid");
        const container = document.getElementById("gridContainer");
        const { start, total } = getRange();
        const w = container.clientWidth;
        const h = container.clientHeight;

        const cols = Math.round(Math.sqrt(total * w / h));
        const rows = Math.ceil(total / cols);

        grid.style.gridTemplateColumns = "repeat(" + cols + ", 1fr)";
        grid.style.gridTemplateRows = "repeat(" + rows + ", 1fr)";
        grid.innerHTML = "";
        days = [];

        // Pre-compute decade boundaries as day indices
        const decadeDays = [];
        for (let dec = 0; dec <= 90; dec += 10) {
          decadeDays.push({
            decade: dec,
            startDay: daysBetween(start, addYears(BIRTH, dec)),
            endDay: daysBetween(start, addYears(BIRTH, dec + 10)),
          });
        }

        for (let i = 0; i < total; i++) {
          const el = document.createElement("div");
          el.className = "day";
          // Find decade for this day
          let decade = 0;
          for (const d of decadeDays) {
            if (i >= d.startDay && i < d.endDay) {
              decade = d.decade;
              break;
            }
          }
          el.dataset.decade = decade;
          grid.appendChild(el);
          days.push(el);
        }

        update();
      }

      function update() {
        const now = new Date();
        const todayStart = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
        );
        const { start, end, total } = getRange();
        const elapsed = daysBetween(start, todayStart);
        const remaining = total - elapsed - 1;

        const age = getCurrentAge();
        const decade = Math.floor(age / 10) * 10;
        const labels = {
          whole: "0 → " + AGE_END,
          from40: AGE_FROM + " → " + AGE_END,
          decade: decade + "'s",
          birthday: age + " → " + (age + 1),
        };
        document.getElementById("viewLabel").textContent = labels[currentMode];
        document.getElementById("elapsed").textContent = Math.max(
          0,
          elapsed,
        ).toLocaleString();
        document.getElementById("today").textContent =
          todayStart.toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric",
          });
        document.getElementById("remaining").textContent = Math.max(
          0,
          remaining,
        ).toLocaleString();

        const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
        document.getElementById("progress").style.width = pct.toFixed(2) + "%";

        for (let i = 0; i < days.length; i++) {
          const dec = days[i].dataset.decade;
          if (i < elapsed) {
            days[i].className = "day elapsed";
            days[i].style.background = DECADE_COLORS[dec] || DECADE_COLORS[0];
          } else if (i === elapsed) {
            days[i].className = "day today";
            days[i].style.background = "";
          } else {
            days[i].className = "day remaining";
            days[i].style.background = DECADE_REMAINING[dec] || DECADE_REMAINING[0];
          }
        }
      }

      function updateLabels() {
        const age = getCurrentAge();
        const decade = Math.floor(age / 10) * 10;
        document.getElementById("btnWhole").textContent = "0 → " + AGE_END;
        document.getElementById("btnFrom40").textContent = AGE_FROM + " → " + AGE_END;
        document.getElementById("btnDecade").textContent = decade + "'s";
        document.getElementById("btnBirthday").textContent = age + " → " + (age + 1);
      }

      updateURL();
      updateLabels();
      buildGrid();
      window.addEventListener("resize", buildGrid);

      function scheduleNextUpdate() {
        const now = new Date();
        const tomorrow = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate() + 1,
        );
        const ms = tomorrow - now + 1000;
        setTimeout(() => {
          updateLabels();
          update();
          scheduleNextUpdate();
        }, ms);
      }
      scheduleNextUpdate();
    </script>
  </body>
</html>
