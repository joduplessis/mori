<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Momento Mori" />
    <meta name="theme-color" content="#F6F1EB" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
    <title>Momento Mori</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Serif:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #F6F1EB;
        --bg-card: #FFFCF8;
        --ink: #2C2520;
        --ink-soft: #7A6E64;
        --ink-faint: #B8AFA6;
        --accent: #D4622B;
        --accent-soft: #F0DDD0;
        --green: #4A7C59;
        --green-soft: #DDE8D8;
        --red: #B84233;
        --red-soft: #F2DAD5;
        --border: #E4DDD5;
        --shadow: 0 1px 3px rgba(44,37,32,0.06), 0 4px 12px rgba(44,37,32,0.04);
        --shadow-lg: 0 2px 8px rgba(44,37,32,0.08), 0 12px 32px rgba(44,37,32,0.06);
        --radius: 10px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: 'IBM Plex Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
        padding: 20px 24px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
        margin-bottom: 12px;
        flex-wrap: wrap;
        gap: 8px;
      }

      .toggle {
        display: flex;
        background: var(--bg-card);
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border);
        flex-shrink: 0;
        box-shadow: var(--shadow);
      }

      .toggle button {
        background: none;
        border: none;
        color: var(--ink-soft);
        font-size: 11px;
        padding: 6px 14px;
        cursor: pointer;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 500;
        transition: all 0.2s;
        letter-spacing: -0.2px;
      }

      .toggle button.active {
        background: var(--accent);
        color: #fff;
      }

      .toggle button:hover:not(.active) {
        color: var(--ink);
        background: var(--accent-soft);
      }

      .stats {
        display: flex;
        gap: 20px;
        font-size: 12px;
        color: var(--ink-faint);
      }

      .stat {
        display: flex;
        align-items: baseline;
        gap: 5px;
      }

      .stat-value {
        font-family: 'JetBrains Mono', monospace;
        font-variant-numeric: tabular-nums;
        color: var(--ink-soft);
        font-weight: 500;
        font-size: 12px;
      }

      .stat-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
        color: var(--ink-faint);
      }

      .progress-bar {
        flex-shrink: 0;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin-bottom: 12px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--green), #6a9f6e, var(--accent));
        border-radius: 2px;
        transition: width 1s ease;
      }

      .grid-container {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #grid {
        display: grid;
        gap: 1px;
        width: 100%;
        height: 100%;
      }

      .day {
        border-radius: 1px;
      }

      .day.today {
        background: var(--accent);
        border-radius: 1px;
        box-shadow: 0 0 4px rgba(212, 98, 43, 0.45);
      }

      .day.remaining {
        background: var(--border);
      }

      .age-markers {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        font-family: 'JetBrains Mono', monospace;
        color: var(--ink-faint);
        margin-top: 6px;
        padding: 0 2px;
      }

      @media (max-width: 600px) {
        .header {
          justify-content: center;
        }
        .stats {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="toggle" id="toggle">
        <button data-mode="whole" id="btnWhole" class="active">—</button>
        <button data-mode="from40" id="btnFrom40">—</button>
        <button data-mode="decade" id="btnDecade">—</button>
        <button data-mode="birthday" id="btnBirthday">—</button>
        <button data-mode="month" id="btnMonth">—</button>
        <button data-mode="week" id="btnWeek">—</button>
      </div>
      <div class="stats">
        <div class="stat">
          <span class="stat-value" id="today">—</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="viewLabel">—</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="elapsed">—</span>
          <span class="stat-label">elapsed</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="remaining">—</span>
          <span class="stat-label">left</span>
        </div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="grid-container" id="gridContainer">
      <div id="grid"></div>
    </div>

    <div class="age-markers" id="ageMarkers"></div>

    <script>
      // ── CONFIG ──
      const params = new URLSearchParams(window.location.search);
      const birthParam = params.get("birth");
      const BIRTH = birthParam ? new Date(birthParam) : new Date(1971, 5, 28);
      const AGE_END = parseInt(params.get("end")) || 80;
      const AGE_FROM = parseInt(params.get("from")) || 50;

      function updateURL() {
        const p = new URLSearchParams();
        const b = BIRTH.getFullYear() + "-" + String(BIRTH.getMonth() + 1).padStart(2, "0") + "-" + String(BIRTH.getDate()).padStart(2, "0");
        p.set("birth", b);
        p.set("end", AGE_END);
        p.set("from", AGE_FROM);
        p.set("mode", currentMode);
        history.replaceState(null, "", "?" + p.toString());
      }
      // ────────────

      // Decade colors — warm earthy greens for elapsed days
      const DECADE_COLORS = {
        0:  "#3d6b4e",
        10: "#4a7c59",
        20: "#578d64",
        30: "#659e70",
        40: "#74af7d",
        50: "#85bf8b",
        60: "#97cf9b",
        70: "#aadcab",
        80: "#bee8bd",
        90: "#d4f1d2",
      };

      // Remaining day colors per decade — warm beige/tan variations
      const DECADE_REMAINING = {
        0:  "#e4ddd5",
        10: "#e2dad1",
        20: "#dfd6cc",
        30: "#dcd2c7",
        40: "#d9cec2",
        50: "#d6cabd",
        60: "#d3c6b8",
        70: "#d0c2b3",
        80: "#cdbeae",
        90: "#cabaa9",
      };

      const VALID_MODES = ["whole", "from40", "decade", "birthday", "month", "week"];
      const savedMode = params.get("mode");
      let currentMode = VALID_MODES.includes(savedMode) ? savedMode : "whole";

      function addYears(date, years) {
        const d = new Date(date);
        d.setFullYear(d.getFullYear() + years);
        return d;
      }

      function daysBetween(a, b) {
        return Math.floor((b - a) / 86400000);
      }

      function getCurrentAge() {
        const now = new Date();
        return Math.floor((now - BIRTH) / (365.25 * 86400000));
      }

      function getRange() {
        if (currentMode === "decade") {
          const currentDecade = Math.floor(getCurrentAge() / 10) * 10;
          const start = addYears(BIRTH, currentDecade);
          const end = addYears(BIRTH, currentDecade + 10);
          return { start, end, total: daysBetween(start, end) };
        }
        if (currentMode === "birthday") {
          const now = new Date();
          const age = getCurrentAge();
          const lastBirthday = addYears(BIRTH, age);
          const nextBirthday = addYears(BIRTH, age + 1);
          if (lastBirthday > now) {
            return { start: addYears(BIRTH, age - 1), end: lastBirthday, total: daysBetween(addYears(BIRTH, age - 1), lastBirthday) };
          }
          return { start: lastBirthday, end: nextBirthday, total: daysBetween(lastBirthday, nextBirthday) };
        }
        if (currentMode === "month") {
          const now = new Date();
          const start = new Date(now.getFullYear(), now.getMonth(), 1);
          const end = new Date(now.getFullYear(), now.getMonth() + 1, 1);
          return { start, end, total: daysBetween(start, end) };
        }
        if (currentMode === "week") {
          const now = new Date();
          const day = now.getDay(); // 0=Sun
          const start = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day);
          const end = new Date(start.getTime() + 7 * 86400000);
          return { start, end, total: 7 };
        }
        const start = currentMode === "whole" ? BIRTH : addYears(BIRTH, AGE_FROM);
        const end = addYears(BIRTH, AGE_END);
        return { start, end, total: daysBetween(start, end) };
      }

      function getDecadeForDay(dayIndex, rangeStart) {
        const dayDate = new Date(rangeStart.getTime() + dayIndex * 86400000);
        const ageMs = dayDate - BIRTH;
        const ageYears = ageMs / (365.25 * 86400000);
        const decade = Math.floor(ageYears / 10) * 10;
        return Math.min(decade, 90);
      }

      let days = [];

      document.querySelectorAll("#toggle button").forEach((b) => {
        b.classList.toggle("active", b.dataset.mode === currentMode);
      });

      document.getElementById("toggle").addEventListener("click", function (e) {
        const btn = e.target.closest("button[data-mode]");
        if (!btn || btn.classList.contains("active")) return;
        document
          .querySelectorAll("#toggle button")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        currentMode = btn.dataset.mode;
        updateURL();
        buildGrid();
      });

      function buildGrid() {
        const grid = document.getElementById("grid");
        const container = document.getElementById("gridContainer");
        const { start, total } = getRange();
        const w = container.clientWidth;
        const h = container.clientHeight;

        const cols = Math.round(Math.sqrt(total * w / h));
        const rows = Math.ceil(total / cols);

        grid.style.gridTemplateColumns = "repeat(" + cols + ", 1fr)";
        grid.style.gridTemplateRows = "repeat(" + rows + ", 1fr)";
        grid.innerHTML = "";
        days = [];

        const decadeDays = [];
        for (let dec = 0; dec <= 90; dec += 10) {
          decadeDays.push({
            decade: dec,
            startDay: daysBetween(start, addYears(BIRTH, dec)),
            endDay: daysBetween(start, addYears(BIRTH, dec + 10)),
          });
        }

        for (let i = 0; i < total; i++) {
          const el = document.createElement("div");
          el.className = "day";
          let decade = 0;
          for (const d of decadeDays) {
            if (i >= d.startDay && i < d.endDay) {
              decade = d.decade;
              break;
            }
          }
          el.dataset.decade = decade;
          grid.appendChild(el);
          days.push(el);
        }

        update();
      }

      function update() {
        const now = new Date();
        const todayStart = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate(),
        );
        const { start, end, total } = getRange();
        const elapsed = daysBetween(start, todayStart);
        const remaining = total - elapsed - 1;

        const age = getCurrentAge();
        const decade = Math.floor(age / 10) * 10;
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        const labels = {
          whole: "0 → " + AGE_END,
          from40: AGE_FROM + " → " + AGE_END,
          decade: decade + "'s",
          birthday: age + " → " + (age + 1),
          month: monthNames[now.getMonth()] + " " + now.getFullYear(),
          week: "This week",
        };
        document.getElementById("viewLabel").textContent = labels[currentMode];
        document.getElementById("elapsed").textContent = Math.max(
          0,
          elapsed,
        ).toLocaleString();
        document.getElementById("today").textContent =
          todayStart.toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric",
          });
        document.getElementById("remaining").textContent = Math.max(
          0,
          remaining,
        ).toLocaleString();

        const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
        document.getElementById("progress").style.width = pct.toFixed(2) + "%";

        for (let i = 0; i < days.length; i++) {
          const dec = days[i].dataset.decade;
          if (i < elapsed) {
            days[i].className = "day elapsed";
            days[i].style.background = DECADE_COLORS[dec] || DECADE_COLORS[0];
          } else if (i === elapsed) {
            days[i].className = "day today";
            days[i].style.background = "";
          } else {
            days[i].className = "day remaining";
            days[i].style.background = DECADE_REMAINING[dec] || DECADE_REMAINING[0];
          }
        }
      }

      function updateLabels() {
        const age = getCurrentAge();
        const decade = Math.floor(age / 10) * 10;
        const now = new Date();
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        document.getElementById("btnWhole").textContent = "0 → " + AGE_END;
        document.getElementById("btnFrom40").textContent = AGE_FROM + " → " + AGE_END;
        document.getElementById("btnDecade").textContent = decade + "'s";
        document.getElementById("btnBirthday").textContent = age + " → " + (age + 1);
        document.getElementById("btnMonth").textContent = monthNames[now.getMonth()];
        document.getElementById("btnWeek").textContent = "Week";
      }

      updateURL();
      updateLabels();
      buildGrid();
      window.addEventListener("resize", buildGrid);

      function scheduleNextUpdate() {
        const now = new Date();
        const tomorrow = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate() + 1,
        );
        const ms = tomorrow - now + 1000;
        setTimeout(() => {
          updateLabels();
          update();
          scheduleNextUpdate();
        }, ms);
      }
      scheduleNextUpdate();
    </script>
  </body>
</html>
